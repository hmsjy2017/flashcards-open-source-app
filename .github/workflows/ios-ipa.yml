name: iOS IPA

on:
  workflow_dispatch:
    inputs:
      build-number:
        description: Build number override. Defaults to the GitHub run number.
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - apps/ios/**
      - .github/workflows/ios-ipa.yml

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 60
    env:
      IOS_APP_BUNDLE_IDENTIFIER: ${{ vars.IOS_APP_BUNDLE_IDENTIFIER || 'com.flashcards-open-source-app.app' }}
      IOS_API_BASE_URL: ${{ vars.IOS_API_BASE_URL || 'https://api.flashcards-open-source-app.com/v1' }}
      IOS_AUTH_BASE_URL: ${{ vars.IOS_AUTH_BASE_URL || 'https://auth.flashcards-open-source-app.com' }}
      IOS_PRIVACY_POLICY_URL: ${{ vars.IOS_PRIVACY_POLICY_URL || 'https://flashcards-open-source-app.com/privacy/' }}
      IOS_TERMS_OF_SERVICE_URL: ${{ vars.IOS_TERMS_OF_SERVICE_URL || 'https://flashcards-open-source-app.com/terms/' }}
      IOS_SUPPORT_URL: ${{ vars.IOS_SUPPORT_URL || 'https://flashcards-open-source-app.com/support/' }}
      IOS_SUPPORT_EMAIL_ADDRESS: ${{ vars.IOS_SUPPORT_EMAIL_ADDRESS || 'kirill+flashcards@kirill-markin.com' }}
      IOS_SENTRY_DSN: ${{ secrets.IOS_SENTRY_DSN }}
      IOS_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.IOS_SENTRY_TRACES_SAMPLE_RATE || '0.0' }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_IOS_PROJECT: ${{ secrets.SENTRY_IOS_PROJECT }}
      SENTRY_URL: ${{ secrets.SENTRY_URL }}
      ARCHIVE_PATH: tmp/ios-archives/Flashcards.xcarchive
      EXPORT_PATH: tmp/ios-export

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Generate unsigned iOS build configuration
        run: |
          set -eu

          escape_xcconfig_url() {
            printf "%s" "$1" | sed 's#://#:/$()/#g'
          }

          mkdir -p apps/ios/Flashcards/Config

          cat > apps/ios/Flashcards/Config/Local.xcconfig <<EOF
          // Generated by GitHub Actions.
          // Do not commit this file.
          DEVELOPMENT_TEAM =
          APP_BUNDLE_IDENTIFIER = ${IOS_APP_BUNDLE_IDENTIFIER}
          API_BASE_URL = $(escape_xcconfig_url "${IOS_API_BASE_URL}")
          AUTH_BASE_URL = $(escape_xcconfig_url "${IOS_AUTH_BASE_URL}")
          PRIVACY_POLICY_URL = $(escape_xcconfig_url "${IOS_PRIVACY_POLICY_URL}")
          TERMS_OF_SERVICE_URL = $(escape_xcconfig_url "${IOS_TERMS_OF_SERVICE_URL}")
          SUPPORT_URL = $(escape_xcconfig_url "${IOS_SUPPORT_URL}")
          SUPPORT_EMAIL_ADDRESS = ${IOS_SUPPORT_EMAIL_ADDRESS}
          FLASHCARDS_SENTRY_DSN = $(escape_xcconfig_url "${IOS_SENTRY_DSN}")
          FLASHCARDS_SENTRY_ENVIRONMENT = production
          FLASHCARDS_SENTRY_TRACES_SAMPLE_RATE = ${IOS_SENTRY_TRACES_SAMPLE_RATE}
          APP_CURRENT_PROJECT_VERSION = ${{ inputs['build-number'] || github.run_number }}
          EOF

      - name: Archive unsigned app
        run: |
          set -eu

          xcodebuild \
            -project "apps/ios/Flashcards/Flashcards Open Source App.xcodeproj" \
            -scheme "Flashcards Open Source App" \
            -configuration Release \
            -derivedDataPath "tmp/ios-derived-data" \
            -destination "generic/platform=iOS" \
            -archivePath "${ARCHIVE_PATH}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Upload dSYMs to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != '' && env.SENTRY_IOS_PROJECT != '' }}
        run: CI_ARCHIVE_PATH="${ARCHIVE_PATH}" sh apps/ios/Flashcards/ci_scripts/ci_post_xcodebuild.sh

      - name: Package unsigned IPA
        run: |
          set -eu

          app_path=$(find "${ARCHIVE_PATH}/Products/Applications" -maxdepth 1 -name "*.app" -type d | head -n 1)

          if [ -z "${app_path}" ]; then
            echo "No archived .app found under ${ARCHIVE_PATH}/Products/Applications" >&2
            exit 1
          fi

          rm -rf "${EXPORT_PATH}"
          mkdir -p "${EXPORT_PATH}/Payload"

          ditto "${app_path}" "${EXPORT_PATH}/Payload/$(basename "${app_path}")"

          (
            cd "${EXPORT_PATH}"
            zip -qry "Flashcards-unsigned.ipa" Payload
          )

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashcards-ios-unsigned-ipa
          path: tmp/ios-export/Flashcards-unsigned.ipa
          if-no-files-found: error
          retention-days: 90
