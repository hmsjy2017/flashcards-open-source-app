get:
  tags:
    - discovery
  summary: Discovery alias
  description: >-
    Primary discovery entrypoint. Returns the same compact envelope as GET
    /agent.
  responses:
    '200':
      description: Agent discovery envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentDiscoveryEnvelope.yaml
          example:
            ok: true
            data:
              service:
                name: flashcards-open-source-app
                version: v1
                description: >-
                  Offline-first flashcards service with user-owned workspaces
                  and a compact SQL agent surface.
              authentication:
                type: email_otp_then_api_key
                sendCodeUrl: https://auth.flashcards-open-source-app.com/api/agent/send-code
                verifyCodeUrl: https://auth.flashcards-open-source-app.com/api/agent/verify-code
              capabilitiesAfterLogin:
                - Load account context
                - Select a workspace
                - Run SQL reads and writes
                - Inspect the published SQL surface
              authBaseUrl: https://auth.flashcards-open-source-app.com
              apiBaseUrl: https://api.flashcards-open-source-app.com/v1
              surface:
                accountUrl: https://api.flashcards-open-source-app.com/v1/agent/me
                workspacesUrl: https://api.flashcards-open-source-app.com/v1/agent/workspaces
                sqlUrl: https://api.flashcards-open-source-app.com/v1/agent/sql
              mcp:
                url: https://mcp.flashcards-open-source-app.com/mcp
                description: >-
                  Remote MCP server for AI clients that connect through custom
                  connectors (for example Claude.ai or ChatGPT). Add the url as a
                  custom connector and authorize through OAuth, then use the sql
                  tool to read and write cards and decks.
                authorization:
                  type: oauth2
                  authorizationServer: https://auth.flashcards-open-source-app.com
                  authorizationServerMetadataUrl: https://auth.flashcards-open-source-app.com/.well-known/oauth-authorization-server
                  protectedResourceMetadataUrl: https://mcp.flashcards-open-source-app.com/.well-known/oauth-protected-resource
            instructions: >-
              Start with agent auth bootstrap. First call POST
              https://auth.flashcards-open-source-app.com/api/agent/send-code
              with the user's email. After send-code, follow the returned
              instructions: normal accounts require the 8-digit email code,
              while configured review/demo accounts use a deterministic 8-digit
              placeholder and do not send email. Do not immediately replay
              send-code. Then call POST
              https://auth.flashcards-open-source-app.com/api/agent/verify-code
              with the otpSessionToken, code, and label to obtain a long-lived
              API key. After login, call GET /v1/agent/me, then GET
              /v1/agent/workspaces?limit=100. If no workspace is selected,
              select one before using POST /v1/agent/sql. For routine low-risk
              writes, a clear user request already counts as permission. Ask
              again only for risky or unclear actions. Use docs.openapiUrl for
              the published external agent contract.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
