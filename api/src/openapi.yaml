  /me/progress/leaderboards/profiles/{publicProfileId}:
    get:
      tags:
        - bootstrap
      summary: Load a public leaderboard profile summary
      description: >-
        Returns a privacy-limited aggregate profile summary for an opted-in
        public profile that already participates in a public Progress
        leaderboard, or for the viewer's own opted-in public profile. Guests
        receive status linked_account_required and opted-out viewers receive
        participation_disabled. Ineligible or unknown target profiles receive
        profile_unavailable. Ready responses expose only the opaque public
        profile id, locale-derived anonymous display name, optional
        viewer-private friendDisplayName, aggregate leaderboard metrics, 30
        zero-filled profile-local review activity days with UTC fallback for old
        reviews, joinedAt, totalCards, and generatedAt. Timezone names, internal
        user ids, emails, workspace ids, deck ids, card ids, and raw review
        timestamps are never returned.
      security:
        - BearerAuth: []
        - GuestAuthorizationHeader: []
        - SessionCookie: []
      parameters:
        - name: publicProfileId
          in: path
          required: true
          schema:
            $ref: ./components/schemas/UuidString.yaml
      responses:
        '200':
          description: Public leaderboard profile summary envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardProfileResponse'
              example:
