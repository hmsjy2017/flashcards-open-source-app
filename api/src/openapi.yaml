openapi: 3.1.0
info:
  title: Flashcards Open Source App External AI-Agent API
  version: v1
  description: >-
    Public API contract for external AI agents. This document excludes internal
    sync transport, local chat runtime endpoints, and human-only agent
    connection management.
servers:
  - url: https://api.flashcards-open-source-app.com/v1
    description: >-
      Canonical API host for discovery, bootstrap, docs, and external agent
      tools
  - url: https://auth.flashcards-open-source-app.com
    description: Auth host for agent auth bootstrap
tags:
  - name: discovery
    description: Entry points and documentation aliases for the external AI-agent contract.
  - name: auth
    description: >-
      Agent auth bootstrap on the auth host. Normal accounts use email OTP;
      configured review/demo accounts use a deterministic placeholder code.
      These routes issue long-lived ApiKey credentials.
  - name: bootstrap
    description: >-
      Agent-oriented account and workspace bootstrap after ApiKey
      authentication, including per-connection workspace selection.
  - name: sql
    description: >-
      Single SQL entrypoint for the selected workspace. Internal sync mechanics
      stay server-side and are not part of this public contract.
paths:
  /:
    $ref: paths/_.yaml
  /agent:
    $ref: paths/agent.yaml
  /openapi.json:
    $ref: paths/openapi.json.yaml
  /swagger.json:
    $ref: paths/swagger.json.yaml
  /agent/openapi.json:
    $ref: paths/agent_openapi.json.yaml
  /agent/swagger.json:
    $ref: paths/agent_swagger.json.yaml
  /api/agent/send-code:
    $ref: paths/api_agent_send-code.yaml
  /api/agent/verify-code:
    $ref: paths/api_agent_verify-code.yaml
  /me:
    get:
      tags:
        - bootstrap
      summary: Load signed-in account context
      description: >-
        Returns the authenticated account profile, selected workspace id,
        CSRF token for session callers, and server-owned account preferences.
      security:
        - BearerAuth: []
        - GuestAuthorizationHeader: []
        - SessionCookie: []
      responses:
        '200':
          description: Account context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
              example:
                userId: user-1
                selectedWorkspaceId: 50b5b928-7f04-4cc8-878d-6cd0e8b98474
                authTransport: session
                csrfToken: csrf-token
                profile:
                  email: kirill@example.com
                  locale: en
                  createdAt: '2026-03-07T10:40:54.589Z'
                preferences:
                  reviewReactionAnimationsEnabled: true
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/preferences:
    patch:
      tags:
        - bootstrap
      summary: Update signed-in account preferences
      description: >-
        Persists server-owned preferences on the account. Session callers must
        send a valid X-CSRF-Token header. ApiKey authentication is rejected.
      security:
        - BearerAuth: []
        - GuestAuthorizationHeader: []
        - SessionCookie: []
          CsrfTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountPreferences'
            example:
              reviewReactionAnimationsEnabled: false
      responses:
        '200':
          description: Updated account preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPreferencesResponse'
              example:
                preferences:
                  reviewReactionAnimationsEnabled: false
        '400':
          description: Invalid preference payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden authentication transport or invalid session CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/community/profile:
    get:
      tags:
        - bootstrap
      summary: Load signed-in community public profile
      description: >-
        Ensures the authenticated app user has a stable opaque public community
        profile and returns only client-safe public profile fields. ApiKey
        authentication is rejected.
      security:
        - BearerAuth: []
        - GuestAuthorizationHeader: []
        - SessionCookie: []
      responses:
        '200':
          description: Community public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityPublicProfileResponse'
              example:
                publicProfileId: 0cc86d10-18cb-4d64-a2f2-a5fd960b45b2
                anonymousDisplayName: Silver Bright Harbor
                leaderboardParticipationEnabled: true
                linkedAccountRequiredForLeaderboard: false
        '403':
          description: Forbidden authentication transport
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - bootstrap
      summary: Update community leaderboard participation preference
      description: >-
        Updates only the leaderboard participation preference on the
        authenticated user's community public profile. Session callers must send
        a valid X-CSRF-Token header. ApiKey authentication is rejected.
      security:
        - BearerAuth: []
        - GuestAuthorizationHeader: []
        - SessionCookie: []
          CsrfTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityProfilePatchRequest'
            example:
              leaderboardParticipationEnabled: false
      responses:
        '200':
          description: Updated community public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityPublicProfileResponse'
              example:
                publicProfileId: 0cc86d10-18cb-4d64-a2f2-a5fd960b45b2
                anonymousDisplayName: Silver Bright Harbor
                leaderboardParticipationEnabled: false
                linkedAccountRequiredForLeaderboard: false
        '400':
          description: Invalid community profile payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden authentication transport or invalid session CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /agent/me:
    $ref: paths/agent_me.yaml
  /agent/workspaces:
    $ref: paths/agent_workspaces.yaml
  /agent/workspaces/{workspaceId}/select:
    $ref: paths/agent_workspaces_{workspaceId}_select.yaml
  /agent/sql:
    $ref: paths/agent_sql.yaml
components:
  securitySchemes:
    ApiKeyHeader:
      $ref: ./components/security-schemes/ApiKeyHeader.yaml
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Cognito ID token
    GuestAuthorizationHeader:
      type: apiKey
      in: header
      name: Authorization
      description: Guest session token formatted as `Guest <token>`.
    SessionCookie:
      type: apiKey
      in: cookie
      name: session
    CsrfTokenHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
  schemas:
    AccountPreferences:
      type: object
      additionalProperties: false
      required:
        - reviewReactionAnimationsEnabled
      properties:
        reviewReactionAnimationsEnabled:
          type: boolean
          default: true
    AccountPreferencesResponse:
      type: object
      additionalProperties: false
      required:
        - preferences
      properties:
        preferences:
          $ref: '#/components/schemas/AccountPreferences'
    CommunityProfilePatchRequest:
      type: object
      additionalProperties: false
      required:
        - leaderboardParticipationEnabled
      properties:
        leaderboardParticipationEnabled:
          type: boolean
          default: true
    CommunityPublicProfileResponse:
      type: object
      additionalProperties: false
      required:
        - publicProfileId
        - anonymousDisplayName
        - leaderboardParticipationEnabled
        - linkedAccountRequiredForLeaderboard
      properties:
        publicProfileId:
          $ref: ./components/schemas/UuidString.yaml
        anonymousDisplayName:
          type: string
          description: Locale-aware anonymous display label derived from the public profile id.
        leaderboardParticipationEnabled:
          type: boolean
        linkedAccountRequiredForLeaderboard:
          type: boolean
    ErrorResponse:
      type: object
      additionalProperties: true
      required:
        - error
      properties:
        error:
          type: string
        requestId:
          type:
            - string
            - 'null'
        code:
          type:
            - string
            - 'null'
    MeResponse:
      type: object
      additionalProperties: false
      required:
        - userId
        - selectedWorkspaceId
        - authTransport
        - csrfToken
        - profile
        - preferences
      properties:
        userId:
          type: string
        selectedWorkspaceId:
          anyOf:
            - $ref: ./components/schemas/UuidString.yaml
            - type: 'null'
        authTransport:
          type: string
          enum:
            - bearer
            - guest
            - session
        csrfToken:
          type:
            - string
            - 'null'
        profile:
          type: object
          additionalProperties: false
          required:
            - email
            - locale
            - createdAt
          properties:
            email:
              type:
                - string
                - 'null'
              format: email
            locale:
              type: string
            createdAt:
              type: string
              format: date-time
        preferences:
          $ref: '#/components/schemas/AccountPreferences'
