        - qualifiedReviewCount
        - rank
      properties:
        kind:
          type: string
          enum:
            - participant
            - viewer
        publicProfileId:
          $ref: ./components/schemas/UuidString.yaml
        anonymousDisplayName:
          type: string
          description: Locale-aware anonymous display label derived from the public profile id.
        friendDisplayName:
          type: string
          description: Viewer-private friend label shown only for current opted-in friends.
        qualifiedReviewCount:
          type: integer
          minimum: 0
        rank:
          type: integer
          minimum: 1
    ProgressLeaderboardWindow:
      type: object
      additionalProperties: false
      required:
        - windowKey
        - snapshotId
        - snapshotGeneratedAt
        - asOfServerHour
        - nextRefreshAfter
        - participantCount
        - viewer
        - rows
        - rankingRows
      properties:
        windowKey:
          $ref: '#/components/schemas/LeaderboardWindowKey'
        snapshotId:
          $ref: ./components/schemas/UuidString.yaml
        snapshotGeneratedAt:
          type: string
          format: date-time
        asOfServerHour:
          type: string
          format: date-time
        nextRefreshAfter:
          type: string
          format: date-time
        participantCount:
          type: integer
          minimum: 0
          description: >-
            Size of the viewer-perspective ranking. Includes all opted-in
            non-demo public profiles with at least one all-time qualified review,
            including profiles with count 0 in this window, and always includes
            the viewer so the viewer rank is never greater than this value.
        viewer:
          $ref: '#/components/schemas/ProgressLeaderboardViewer'
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ProgressLeaderboardRow'
        rankingRows:
          type: array
          description: Full frozen viewer-perspective ranking list with contiguous ranks and no gap rows.
          items:
            $ref: '#/components/schemas/ProgressLeaderboardRankingRow'
    ProgressLeaderboardResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - metric
        - defaultWindowKey
        - windows
      properties:
        status:
          type: string
          enum:
            - ready
            - linked_account_required
            - participation_disabled
            - snapshot_unavailable
        metric:
          $ref: '#/components/schemas/ProgressLeaderboardMetric'
        defaultWindowKey:
          $ref: '#/components/schemas/LeaderboardWindowKey'
          description: >-
            Client default selection. Ready responses choose the window where
            the viewer has the lowest rank number; tied ranks prefer the
            shortest period in canonical window order.
        windows:
          type: array
          description: Empty unless status is ready; otherwise one item per leaderboard window.
          items:
            $ref: '#/components/schemas/ProgressLeaderboardWindow'
    LeaderboardProfileRatingPlacement:
      type: object
      additionalProperties: false
      required:
        - windowKey
        - rank
      properties:
        windowKey:
          $ref: '#/components/schemas/LeaderboardWindowKey'
        rank:
          type: integer
          minimum: 1
          description: Best rank from the latest public rating snapshots.
    LeaderboardProfileMetrics:
      type: object
      additionalProperties: false
      required:
        - currentStreakDays
        - bestRatingPlacement
      properties:
        currentStreakDays:
          type: integer
          minimum: 0
          description: Latest public streak snapshot value for the profile, or 0 when absent.
        bestRatingPlacement:
          anyOf:
            - $ref: '#/components/schemas/LeaderboardProfileRatingPlacement'
            - type: 'null'
          description: >-
            Lowest rank from latest rating snapshots across all canonical
            windows. Tied ranks prefer the shortest window order.
    LeaderboardProfileReviewActivityDay:
      type: object
      additionalProperties: false
      required:
        - date
        - reviewCount
      properties:
        date:
          type: string
          format: date
        reviewCount:
          type: integer
          minimum: 0
    LeaderboardProfileReviewActivity:
      type: object
      additionalProperties: false
      required:
        - dateBasis
        - days
      properties:
        dateBasis:
          type: string
          enum:
            - profile_local_day_with_utc_fallback
          description: >-
            Dates use stored profile-local review days when present and UTC
            dates only for older review events without stored local dates.
        days:
          type: array
          minItems: 30
          maxItems: 30
          items:
            $ref: '#/components/schemas/LeaderboardProfileReviewActivityDay'
    LeaderboardProfileStats:
      type: object
      additionalProperties: false
      required:
        - joinedAt
        - totalCards
      properties:
        joinedAt:
          type: string
          format: date-time
          description: Public profile creation timestamp.
        totalCards:
          type: integer
          minimum: 0
          description: Aggregate active card count across workspaces where the profile owner is a member.
