openapi: 3.1.0
info:
  title: Flashcards Open Source App External AI-Agent API
  version: v1
  description: >-
    Public API contract for external AI agents. This document excludes internal
    sync transport, local chat runtime endpoints, and human-only agent
    connection management.
servers:
  - url: https://api.flashcards-open-source-app.com/v1
    description: >-
      Canonical API host for discovery, bootstrap, docs, and external agent
      tools
  - url: https://auth.flashcards-open-source-app.com
    description: Auth host for agent auth bootstrap
tags:
  - name: discovery
    description: Entry points and documentation aliases for the external AI-agent contract.
  - name: auth
    description: >-
      Agent auth bootstrap on the auth host. Normal accounts use email OTP;
      configured review/demo accounts use a deterministic placeholder code.
      These routes issue long-lived ApiKey credentials.
  - name: bootstrap
    description: >-
      Agent-oriented account and workspace bootstrap after ApiKey
      authentication, including per-connection workspace selection.
  - name: sql
    description: >-
      Single SQL entrypoint for the selected workspace. Internal sync mechanics
      stay server-side and are not part of this public contract.
paths:
  /:
    $ref: paths/_.yaml
  /agent:
    $ref: paths/agent.yaml
  /openapi.json:
    $ref: paths/openapi.json.yaml
  /swagger.json:
    $ref: paths/swagger.json.yaml
  /agent/openapi.json:
    $ref: paths/agent_openapi.json.yaml
  /agent/swagger.json:
    $ref: paths/agent_swagger.json.yaml
  /api/agent/send-code:
    $ref: paths/api_agent_send-code.yaml
  /api/agent/verify-code:
    $ref: paths/api_agent_verify-code.yaml
  /me:
    get:
      tags:
        - bootstrap
      summary: Load signed-in account context
      description: >-
        Returns the authenticated account profile, selected workspace id,
        CSRF token for session callers, and server-owned account preferences.
      security:
        - BearerAuth: []
        - GuestAuthorizationHeader: []
        - SessionCookie: []
      responses:
        '200':
          description: Account context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
              example:
                userId: user-1
                selectedWorkspaceId: 50b5b928-7f04-4cc8-878d-6cd0e8b98474
                authTransport: session
                csrfToken: csrf-token
                profile:
                  email: kirill@example.com
                  locale: en
                  createdAt: '2026-03-07T10:40:54.589Z'
                preferences:
                  reviewReactionAnimationsEnabled: true
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/preferences:
    patch:
      tags:
        - bootstrap
      summary: Update signed-in account preferences
      description: >-
        Persists server-owned preferences on the account. Session callers must
        send a valid X-CSRF-Token header. ApiKey authentication is rejected.
      security:
        - BearerAuth: []
        - GuestAuthorizationHeader: []
        - SessionCookie: []
          CsrfTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountPreferences'
            example:
              reviewReactionAnimationsEnabled: false
      responses:
        '200':
          description: Updated account preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPreferencesResponse'
              example:
                preferences:
                  reviewReactionAnimationsEnabled: false
        '400':
          description: Invalid preference payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden authentication transport or invalid session CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/community/profile:
    get:
      tags:
        - bootstrap
      summary: Load community public profile
      description: >-
        Ensures the authenticated app user or guest has a stable opaque public
        community profile and returns only client-safe public profile fields.
        Guest callers can manage anonymous leaderboard visibility but still
        receive linkedAccountRequiredForLeaderboard=true until they link an
        account. ApiKey authentication is rejected.
      security:
        - BearerAuth: []
        - GuestAuthorizationHeader: []
        - SessionCookie: []
      responses:
        '200':
          description: Community public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityPublicProfileResponse'
              example:
                publicProfileId: 0cc86d10-18cb-4d64-a2f2-a5fd960b45b2
                anonymousDisplayName: Silver Bright Harbor
                leaderboardParticipationEnabled: true
                linkedAccountRequiredForLeaderboard: false
        '403':
          description: Forbidden authentication transport
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - bootstrap
      summary: Update community leaderboard participation preference
      description: >-
        Updates only the leaderboard participation preference on the
        authenticated app user's or guest's community public profile. Session
        callers must send a valid X-CSRF-Token header. ApiKey authentication is
        rejected.
      security:
        - BearerAuth: []
        - GuestAuthorizationHeader: []
        - SessionCookie: []
          CsrfTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityProfilePatchRequest'
            example:
              leaderboardParticipationEnabled: false
      responses:
        '200':
          description: Updated community public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityPublicProfileResponse'
              example:
                publicProfileId: 0cc86d10-18cb-4d64-a2f2-a5fd960b45b2
                anonymousDisplayName: Silver Bright Harbor
                leaderboardParticipationEnabled: false
                linkedAccountRequiredForLeaderboard: false
        '400':
          description: Invalid community profile payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden authentication transport or invalid session CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/community/friend-invitations:
    post:
      tags:
        - bootstrap
      summary: Create a friend invitation link
      description: >-
        Creates a single-use friend invitation link for the signed-in human
        account. The invitee display name is private to the inviter and is
        normalized with trim before storage. ApiKey and Guest authentication are
        rejected. Session callers must send a valid X-CSRF-Token header.
      security:
        - BearerAuth: []
        - SessionCookie: []
          CsrfTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendInvitationCreateRequest'
            example:
              inviteeDisplayName: Priya
      responses:
        '200':
          description: Created friend invitation link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendInvitationCreateResponse'
              example:
                inviteUrl: https://app.flashcards-open-source-app.com/invite/LjCTCGK7DLEh6IJeujO4GtcZD2VN7z5oFMVozdjlggo
                expiresAt: '2026-06-17T10:00:00.000Z'
        '400':
          description: Invalid friend invitation payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden authentication transport or invalid session CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Active invitation limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /community/friend-invitations/{inviteToken}:
    get:
      tags:
        - bootstrap
      summary: Preview a friend invitation link
      description: >-
        Public no-auth preview for a raw friend invite token. The response is
        intentionally small: active links return only status and expiry; unknown,
        expired, inactive, or accepted links return only inactive status. Inviter
        identity, email, public profile id, and private stored display names are
        never returned.
      security: []
      parameters:
        - name: inviteToken
          in: path
          required: true
          schema:
            type: string
          description: Raw invite token from the app invite URL path.
      responses:
        '200':
          description: Friend invitation preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendInvitationPreviewResponse'
              examples:
                active:
                  value:
                    status: active
                    expiresAt: '2026-06-17T10:00:00.000Z'
                inactive:
                  value:
                    status: inactive
        '403':
          description: ApiKey authentication is not supported for public preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/community/friend-invitations/{inviteToken}/accept:
    post:
      tags:
        - bootstrap
      summary: Accept a friend invitation link
      description: >-
        Accepts an active friend invitation link for the signed-in human account
        and creates the directed friendship rows. The inviter display name is
        private to the invitee and is normalized with trim before storage. ApiKey
        and Guest authentication are rejected. Session callers must send a valid
        X-CSRF-Token header.
      security:
        - BearerAuth: []
        - SessionCookie: []
          CsrfTokenHeader: []
      parameters:
        - name: inviteToken
          in: path
          required: true
          schema:
            type: string
          description: Raw invite token from the app invite URL path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendInvitationAcceptRequest'
            example:
              inviterDisplayName: Alex
      responses:
        '200':
          description: Friend invitation acceptance status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendInvitationAcceptResponse'
              examples:
                accepted:
                  value:
                    status: accepted
                alreadyFriends:
                  value:
                    status: already_friends
                    existingFriendDisplayName: Alex
                inactive:
                  value:
                    status: inactive
        '400':
          description: Invalid friend invitation payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden authentication transport or invalid session CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Invitation cannot be accepted by this account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: This is your own invitation link.
                code: FRIEND_INVITATION_SELF
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/progress/leaderboard:
    get:
      tags:
        - bootstrap
      summary: Load the compact community Progress leaderboard
      description: >-
        Returns all five leaderboard windows in one payload for the Progress tab,
        each with viewer-perspective ranks, the per-viewer tie rule, and the
        server-computed compact rows so every client renders the same list.
        Ready windows also include rankingRows, the full frozen viewer-perspective
        ranking list with no gaps, so clients can locally reinsert the viewer
        with live local counts. Compact rows include gap rows for hidden ranks
        and a final last-place row when hidden participants remain below the
        viewer-neighbor group.
        Guests receive status linked_account_required and opted-out users receive
        participation_disabled, both with no other users' rows. ApiKey
        authentication is rejected. Only opaque public profile ids and
        locale-derived anonymous display names are returned by default. Rows can
        also include a viewer-private friendDisplayName when the participant is
        a current opted-in friend of the viewer. Internal user ids, invitation
        ids, emails, and raw review timestamps are never exposed.
      security:
        - BearerAuth: []
        - GuestAuthorizationHeader: []
        - SessionCookie: []
      responses:
        '200':
          description: Compact community leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressLeaderboardResponse'
              example:
